<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي اليوم - أ/ عبدالعزيز الفيفي</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #4a148c; --secondary: #7b1fa2; --bg: #f5f5f5; --accent: #ff9800; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 650px; text-align: center; position: relative; }
        #timer-bar { position: absolute; top: 0; right: 0; height: 6px; background: var(--accent); width: 100%; transition: width 1s linear; border-radius: 15px 15px 0 0; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; background: none; cursor: pointer; transition: 0.3s; font-size: 1.1rem; font-weight: 500; }
        .correct-flash { background-color: #e8f5e9 !important; border-color: var(--correct) !important; color: var(--correct); border-width: 3px !important; }
        .wrong-flash { background-color: #ffeeb2 !important; border-color: var(--wrong) !important; color: var(--wrong); }
        .hidden { display: none; }
        .reading-text { background: #fff9c4; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: right; font-size: 1rem; border-right: 5px solid var(--accent); line-height: 1.6; }
        input[type="text"] { width: 85%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 2px solid #ddd; font-size: 1rem; text-align: center; }
        .btn-start { background: var(--primary); color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
        #feedback { margin-top: 15px; font-weight: bold; font-size: 1.1rem; min-height: 1.5em; }
        #timer-text { font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .copyright { font-size: 0.85rem; color: #666; margin-top: 25px; border-top: 1px solid #eee; padding-top: 10px; }

        .normal-text { color: #000; font-weight: normal; font-size: 0.85rem; }
        .date-red-small { color: #e53e3e; font-size: 0.85rem; font-weight: bold; margin: 10px 0; display: inline-block; }
    </style>
</head>
<body onload="updateDateTime()">

<div class="quiz-container">
    <div id="timer-bar"></div>
    
    <div id="login-section">
        <h2 style="color: var(--primary);">( تحدي اليوم )</h2>
        
        <div id="date-display" class="date-red-small">جاري تحميل التاريخ...</div>
        
        <div class="copyright">أ/ <span class="normal-text">عبدالعزيز الفيفي</span> - <span class="normal-text">ثانوية الأمير عبدالمجيد 🎓</span></div>
        <p></p>
        <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي لتبدأ...">
        <br>
        <button class="btn-start" onclick="startQuiz()">بدأ الاختبار</button>
    </div>

    <div id="quiz-section" class="hidden">
        <div id="timer-text">الوقت المتبقي: 40</div>
        <h3 id="question-title" style="color: var(--secondary); margin-bottom: 5px;"></h3>
        <div id="reading-container" class="reading-text hidden"></div>
        <h2 id="question-text" style="margin-top: 5px;"></h2>
        <div id="options-container"></div>
        <div id="feedback"></div>
        <div class="copyright"> أ/ <span class="normal-text">عبدالعزيز الفيفي</span> - <span class="normal-text">ثانوية الأمير عبدالمجيد 🎓</span></div>
    </div>

    <div id="result-section" class="hidden">
        <h2>تم اكتمال الاختبار بنجاح</h2>
        <h1 id="final-score" style="color: var(--primary);"></h1>
        <link href="https://fonts.googleapis.com" rel="stylesheet">

        <button class="btn-start" onclick="location.reload()" style="
            background: linear-gradient(45deg, #ff512f, #dd2476);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(221, 36, 118, 0.4);
            transition: transform 0.3s ease;
            direction: rtl;
        ">
            ليس هناك تحدٍ أكبر من تطوير ذاتك؛ أعد الكرة الآن 🚀 أو كُن النسخة الأفضل غداً 🔥✨
        </button>

        <style>
            .btn-start:hover {
                transform: scale(1.05);
                box-shadow: 0 6px 20px rgba(221, 36, 118, 0.6);
            }
        </style>

        <p style="margin-top: 20px;">✨ أ / <span class="normal-text">عبد العزيز الفيفي</span> - <span class="normal-text">ثانوية الأمير عبدالمجيد 🎓</span></p>
    </div>
</div>

<script>
    function updateDateTime() {
        const today = new Date();
        const hijriOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', calendar: 'islamic-umalqura', numberingSystem: 'arabic' };
        const gregOptions = { day: 'numeric', month: 'long', year: 'numeric', numberingSystem: 'arabic' };
        
        const hijriDate = new Intl.DateTimeFormat('ar-SA', hijriOptions).format(today);
        const gregDate = new Intl.DateTimeFormat('ar-SA', gregOptions).format(today);
        
        document.getElementById('date-display').innerText = `${hijriDate} | ${gregDate} م`;
    }

    let timeLeft = 40;
    let timerInterval;
    let currentQ = 0;
    let score = 0;
    const TRANSITION_DELAY = 5500;

    const rawData = [
        // تناظر لفظي
        { type: "التناظر اللفظي", q: "أسد : عرين", options: ["صقر : وكر", "نحل : خلية", "إنسان : منزل", "خيل : إسطبل"], correctText: "نحل : خلية" },
        { type: "التناظر اللفظي", q: "تدرج : إتقان", options: ["استماع : فهم", "ركض : تعب", "قراءة : ثقافة", "اجتهاد : نجاح"], correctText: "اجتهاد : نجاح" },
        { type: "التناظر اللفظي", q: "كتاب : صفحات", options: ["سور : حديقة", "يوم : ساعات", "غرفة : فندق", "طائرة : مطار"], correctText: "يوم : ساعات" },
        { type: "التناظر اللفظي", q: "سحاب : مطر", options: ["شمس : ضياء", "نار : حريق", "مقدمة : نتيجة", "غيم : رعد"], correctText: "شمس : ضياء" },

        // إكمال جمل
        { type: "إكمال الجمل", q: "المرء الناجح هو من يغلق فمه قبل أن يغلق الناس .....", options: ["آذانهم", "أبوابهم", "عقولهم", "قلوبهم"], correctText: "آذانهم" },
        { type: "إكمال الجمل", q: "الحياء لا يأتي إلا بـ .....، وهو زينة .....", options: ["خير - النفس", "جمال - الروح", "توفيق - المؤمن", "خلق - الإنسان"], correctText: "خير - النفس" },
        { type: "إكمال الجمل", q: "العلم في الصغر كالنقش على .....، وفي الكبر كالرسم على .....", options: ["الحجر - الماء", "الورق - الخشب", "الرمل - الصخر", "اللوح - الهواء"], correctText: "الحجر - الماء" },
        { type: "إكمال الجمل", q: "يجب أن تكون الرقابة ..... نابعة من الوجدان لا من خوف .....", options: ["الذاتية - العقاب", "الأسرية - المجتمع", "الدولية - القانون", "الفردية - الفشل"], correctText: "الذاتية - العقاب" },

        // مفردة شاذة
        { type: "المفردة الشاذة", q: "ما الكلمة المختلفة؟", options: ["تونس", "المغرب", "السودان", "لبنان"], correctText: "لبنان" },
        { type: "المفردة الشاذة", q: "ما الكلمة المختلفة؟", options: ["الميزان", "المسطرة", "الساعة", "القلم"], correctText: "القلم" },
        { type: "المفردة الشاذة", q: "ما الكلمة المختلفة؟", options: ["الذهب", "الفضة", "النحاس", "الماس"], correctText: "الماس" },
        { type: "المفردة الشاذة", q: "ما الكلمة المختلفة؟", options: ["راديو", "تلفاز", "هاتف", "كتاب"], correctText: "كتاب" },

        // خطأ سياقي
        { type: "الخطأ في السياق", q: "أشد العلماء تواضعاً أكثرهم علماً، كما أن المكان المنخفض أكثر البقاع مطراً", options: ["العلماء", "تواضعاً", "المنخفض", "مطراً"], correctText: "مطراً" },
        { type: "الخطأ في السياق", q: "يجب أن تكون قدوة حسنة لأبنائك، فالأفعال أبلغ من الأقوال في إفسادهم", options: ["قدوة", "حسنة", "أبلغ", "إفسادهم"], correctText: "إفسادهم" },
        { type: "الخطأ في السياق", q: "الاعتذار عن الخطأ يقوي العلاقة، ويجعل القلوب أكثر قسوة", options: ["الاعتذار", "يقوي", "العلاقة", "قسوة"], correctText: "قسوة" },
        { type: "الخطأ في السياق", q: "من يظلم الناس يُظلم، ومن يرحم الناس يَقْسُ عليهم", options: ["يظلم", "يُظلم", "يرحم", "يَقْسُ"], correctText: "يَقْسُ" },

        // استيعاب المقروء (مستوى متقدم)
        { 
            type: "استيعاب المقروء", 
            text: "إن التقدم التقني سلاح ذو حدين؛ فبينما يساهم في تقليص الفجوات الزمنية والمكانية، إلا أنه قد يعزز من العزلة الاجتماعية إذا ما أسيء استخدامه كبديل للتفاعل المباشر.",
            q: "يستنتج من النص أن التقنية في جوهرها:", 
            options: ["مضرة اجتماعياً", "محايدة ونتيجتها تعتمد على المستخدم", "ضرورة لا يمكن الاستغناء عنها", "وسيلة للتفاعل المباشر"], 
            correctText: "محايدة ونتيجتها تعتمد على المستخدم" 
        },
        { 
            type: "استيعاب المقروء", 
            text: "تعتبر أشجار القرم حائط صد طبيعي يحمي الشواطئ من التآكل، كما أنها مأوى للعديد من الكائنات البحرية، مما يجعلها ركيزة أساسية للتنوع البيولوجي الساحلي.",
            q: "علاقة (مما يجعلها ركيزة أساسية) بما قبلها:", 
            options: ["تعليل", "نتيجة", "تفسير", "تضاد"], 
            correctText: "نتيجة" 
        },
        { 
            type: "استيعاب المقروء", 
            text: "تعد الطاقة المتجددة مثل طاقة الرياح والشمس طاقة نظيفة لأنها لا تخلف انبعاثات ضارة للغلاف الجوي، ومع ذلك فإن تكلفتها التأسيسية لا تزال تشكل عائقاً أمام بعض الدول النامية.",
            q: "أي من الآتي يمثل التحدي الحقيقي للطاقة المتجددة حسب النص؟", 
            options: ["ندرتها الطبيعية", "أضرارها البيئية", "الجانب الاقتصادي الأولي", "صعوبة تشغيلها"], 
            correctText: "الجانب الاقتصادي الأولي" 
        },
        { 
            type: "استيعاب المقروء", 
            text: "يتميز الجمل بقدرته على تخزين الدهون في سنامه، مما يساعده على البقاء لفترات طويلة دون طعام في الصحراء، حيث تتحول هذه الدهون إلى طاقة وماء عند الحاجة.",
            q: "وظيفة السنام كما تفهم من النص هي وظيفة:", 
            options: ["تخزينية وتحويلية", "تبريدية للجسم", "دفاعية ضد الأعداء", "حركية للمشي"], 
            correctText: "تخزينية وتحويلية" 
        }
    ];

    let quizData = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        if (!document.getElementById('student-name').value) { alert("لطفاً، ادخل اسمك أولاً"); return; }
        quizData = shuffle([...rawData]);
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentQ];
        const shuffledOptions = shuffle([...q.options]);
        document.getElementById('question-title').innerText = `س ${currentQ + 1} في ( ${q.type} )`;
        const readingBox = document.getElementById('reading-container');
        if (q.text) { readingBox.innerText = q.text; readingBox.classList.remove('hidden'); } 
        else { readingBox.classList.add('hidden'); }
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('feedback').innerText = '';
        shuffledOptions.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.id = `opt-${index}`;
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, opt === q.correctText, q.correctText);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 40;
        updateTimerUI();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if (timeLeft <= 0) { clearInterval(timerInterval); showCorrectAndNext(); }
        }, 1000);
    }

    function updateTimerUI() {
        document.getElementById('timer-text').innerText = `الوقت المتبقي: ${timeLeft}`;
        document.getElementById('timer-bar').style.width = `${(timeLeft / 40) * 100}%`;
    }

    function checkAnswer(index, isCorrect, correctText) {
        clearInterval(timerInterval);
        disableOptions();
        if (isCorrect) {
            score++;
            document.getElementById(`opt-${index}`).classList.add('correct-flash');
            document.getElementById('feedback').innerHTML = "<span style='color:green'>إجابة صحيحة! أحسنت يا بطل 🌟</span>";
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            document.getElementById(`opt-${index}`).classList.add('wrong-flash');
            highlightCorrect(correctText);
            document.getElementById('feedback').innerHTML = "<span style='color:red'>محاولة جيدة، واصل.. 💪 (الصواب بالأخضر)</span>";
        }
        setTimeout(nextQuestion, TRANSITION_DELAY);
    }

    function highlightCorrect(correctText) {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => { if (btn.innerText === correctText) btn.classList.add('correct-flash'); });
    }

    function showCorrectAndNext() {
        const q = quizData[currentQ];
        document.getElementById('feedback').innerHTML = "<span style='color:orange'>انتهى الوقت! الصواب موضح بالأخضر.. واصل 💪</span>";
        highlightCorrect(q.correctText);
        disableOptions();
        setTimeout(nextQuestion, TRANSITION_DELAY);
    }

    function disableOptions() {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < quizData.length) { showQuestion(); } 
        else { finishQuiz(); }
    }

    function finishQuiz() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('final-score').innerText = `درجتك هي: ${score} من ${quizData.length}`;
    }
</script>
</body>
</html>
